---
layout: archive
title: "Blog"
permalink: /blogs/
author_profile: true
---


{% for post in site.posts %}
  <article>
    <header>
      <h1><a href="{{ post.url }}">{{ post.title }}</a></h1>
      <p class="post-meta">Posted on {{ post.date | date: "%B %d, %Y" }}</p>
    </header>

    <section class="post-content">
      {{ post.excerpt }}
    </section>
  </article>
{% endfor %}
